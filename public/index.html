<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>De mal en peor</title>
    <link rel="icon" href="favicon.svg?v=2" type="image/svg+xml">
    <link href="https://fonts.googleapis.com/css2?family=Manrope&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sofia+Sans+Extra+Condensed&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Baskervville&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Work Sans', sans-serif;
            font-size: 1em;
            padding: 40px;
            padding-left: 50px;
            color: #131313;
        }

        button {
            padding: 9px 14px;
            margin: 60px 0 50px 12px;
            font-size: 1em;
            font-family: 'Work Sans', sans-serif;
            color: #131313;
            background: #fff;
            border: 1px solid #131313;
            border-radius: 6px;
            box-shadow: 0 2px 0 #131313;
            cursor: pointer;
            transition: transform 140ms ease, box-shadow 140ms ease, background-color 140ms ease;
        }

        button:hover {
            background: #f7f7f2;
            box-shadow: 0 4px 0 #131313;
            transform: translateY(-2px);
        }

        button:active {
            box-shadow: 0 1px 0 #131313;
            transform: translateY(1px);
        }

        button:disabled {
            cursor: default;
            opacity: 0.55;
            transform: none;
            box-shadow: 0 2px 0 #131313;
        }

        .bottom-buttons {
            position: fixed;
            bottom: calc(5vh + 48px);
            right: 5vw;
            display: block;
            text-align: right;
            z-index: 1000;
        }

        #getDefinitionBtn {
            margin: 0;
            margin-left: 10px;
            padding: 5px;
            font-size: 0.85em;
        }

        #wordInput {
            padding: 5px;
        }

        #nextBtn, #prevBtn {
            margin: 0;
            margin-right: 10px;
            padding: 5px 7.5px 5px 7.5px;
            font-size: 0.85em;
        }

        #muteBtn {
            position: fixed;
            bottom: 5vh;
            right: 5vw;
            margin: 0;
            z-index: 1000;
        }

        #languageSelector {
            position: fixed;
            top: 52px;
            right: 5vw;
            display: flex;
            gap: 6px;
            margin: 0;
            z-index: 1000;
        }

        #languageSelector button {
            min-width: 44px;
            margin: 0;
            padding: 7px 10px;
            font-size: 0.85em;
            line-height: 1;
        }

        #languageSelector button.is-active {
            color: #fff;
            background: #131313;
            box-shadow: 0 1px 0 #131313;
            transform: none;
        }

        #languageSelector button.is-active:hover {
            background: #131313;
            box-shadow: 0 1px 0 #131313;
            transform: none;
        }

        #startBtn {
            display: block;
            margin: 22px 0 0 0;
        }
        
        #name {
            font-family: 'Baskervville', sans-serif;
            font-size: 2.2em;
            margin: none;
            padding-bottom: 20px;
        }

        #credits {
            font-family: 'Work Sans', sans-serif;
            font-size: 1.1em;
            font-weight: 500;
        }

        #credits a {
            display: inline-block;
            color: #131313;
            background: #fff;
            border: 1px solid #131313;
            border-radius: 6px;
            box-shadow: 0 1px 0 #131313;
            padding: 1px 6px 2px;
            text-decoration: none;
            transition: transform 140ms ease, box-shadow 140ms ease, background-color 140ms ease;
        }

        #credits a:hover {
            background: #f7f7f2;
            box-shadow: 0 3px 0 #131313;
            transform: translateY(-2px);
        }

        #credits a:active {
            box-shadow: 0 1px 0 #131313;
            transform: translateY(1px);
        }

        #credits a.definition-credit {
            color: #1a30d7;
            background: transparent;
            border: 0;
            border-radius: 0;
            box-shadow: none;
            padding: 0;
        }

        #credits a.definition-credit:hover {
            background: transparent;
            box-shadow: none;
            transform: none;
            text-decoration: underline;
        }

        #credits a.definition-credit:active {
            box-shadow: none;
            transform: none;
        }

        #current-word {
            font-family: 'Baskervville', sans-serif;
            text-transform: lowercase;
            font-size: 3em;
            font-weight: bold;
        }

        #loading {
            display: none;
            font-family: monospace;
            white-space: nowrap;
            overflow: hidden;
            border-right: 3px solid;
            animation: typing 2s steps(20, end), blink-caret .75s step-end infinite;
        }

        #search-container {
            display: none;
        }

        a {
            text-decoration: none;
            color: #1a30d7;
        }

        #definitions {
            line-height: 1.5em;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: black }
        }

        .ag-tab-selected {border-bottom: 2.5px solid #E58000;}

        .definition-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 18px;
        }

        .definition-actions a {
            color: #131313;
            background: #fff;
            border: 1px solid #131313;
            border-radius: 6px;
            box-shadow: 0 2px 0 #131313;
            padding: 7px 11px;
            text-decoration: none;
            transition: transform 140ms ease, box-shadow 140ms ease, background-color 140ms ease;
        }

        .definition-actions a:hover {
            background: #f7f7f2;
            box-shadow: 0 4px 0 #131313;
            transform: translateY(-2px);
        }

        .definition-actions a:active {
            box-shadow: 0 1px 0 #131313;
            transform: translateY(1px);
        }

        @media (max-width: 600px) {
            body {
                padding: 58px 16px 24px;
            }

            #languageSelector {
                top: 12px;
                right: 12px;
                gap: 4px;
            }

            #languageSelector button {
                min-width: 38px;
                padding: 7px 8px;
            }

            #name {
                font-size: 1.45em;
                line-height: 1.05;
                padding-bottom: 14px;
            }

            #credits {
                font-size: 1em;
            }

            button {
                margin-left: 0;
            }

            .bottom-buttons {
                bottom: calc(5vh + 48px);
                right: 12px;
            }

            #muteBtn {
                right: 12px;
            }
        }
    </style>
</head>
<body>
    <div id="title">
        <div id="name"> <a href="#" id="titleWordOne" class="startGame" data-word="juego" data-word-en="game" data-word-eu="hitzak" style="font-size:1.7em;">Juego</a> <span id="titleConnector">de</span> <a href="#" id="titleWordTwo" class="startGame" data-word="palabras" data-word-en="words" data-word-eu="jokoa" style="font-size:1.7em;">Palabras</a></div>
        <div id="credits"><span id="byLabel">Por</span> <a href="#" class="startGame definition-credit" data-word="roquekes">Roquekes</a> x <a href="#" class="startGame definition-credit" data-word="clovelt">Clovelt</a><br><span id="jamLabel">Para la</span> <a href="https://x.com/MalagaJam">Málaga Jam</a> (W-18)<br><span id="dictionaryCredit">Definiciones cortesía de la</span> <a href="https://x.com/RAEinforma" id="dictionarySource">RAE</a><br><span id="themeLabel">Tema:</span> <strong id="themeText">de mal en peor</strong><button id="startBtn">Jugar</button><br><br></div>
    </div>
    <div id="nav" style="display:none;">
        <button id="nextBtn" style="display:none;">←</button>
        <button id="prevBtn" style="display:none;">→</button>
        <div id="search-container" style="display:none;">
            <input type="text" id="wordInput" placeholder="Escribe una palabra">
            <button id="getDefinitionBtn">Buscar definición</button>
        </div>
    </div>
    <div id="languageSelector" aria-label="Selector de idioma">
        <button class="language-option" type="button" data-lang="es" aria-pressed="false">ES</button>
        <button class="language-option" type="button" data-lang="eu" aria-pressed="false">EU</button>
        <button class="language-option" type="button" data-lang="en" aria-pressed="false">EN</button>
    </div>
    <button id="muteBtn">Silencio</button>
    <button id="easyBtn" style="display:none;">Modo fácil (no hay vuelta atrás)</button>
    <button id="giveUpBtn" style="display:none;">Rendirse</button>
    <button id="restartBtn" style="display:none;">Volver a "mal"</button>   
    <div id="current-word" style="display:none;">Cargando...</div>
    <div id="loading">Cargando definiciones...</div>
    <div id="definitions"></div>
    <div id="message"></div>
    <div class="bottom-buttons">
        <div id="clicks"></div>
    </div>

</html>
